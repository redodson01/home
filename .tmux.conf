if-shell '[[ "$(mode)" == dark ]]' \
  'set-option -g message-style bg=black' \
  'set-option -g message-style bg=white'

if-shell '[[ "$(mode)" == dark ]]' \
  'set-option -g status-style bg=black' \
  'set-option -g status-style bg=white'

set-option -g default-terminal xterm-256color
set-option -g focus-events on
set-option -g mouse on
set-option -g pane-active-border-style hidden,bg=brightred
set-option -g status-right '%a %b %d %I:%M %p'
set-option -g window-status-current-style fg=brightred
