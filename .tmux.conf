if-shell '[[ "$(mode)" == dark ]]' \
  'set-option -g message-style bg=black' \
  'set-option -g message-style bg=white'

if-shell '[[ "$(mode)" == dark ]]' \
  'set-option -g status-style bg=black' \
  'set-option -g status-style bg=white'

# Use xterm-256color instead of tmux-256color so that vim can detect
# background color changes (light/dark mode) via OSC 11 queries.
set-option -g default-terminal xterm-256color
set-option -g focus-events on
set-option -g mouse on
set-option -g pane-active-border-style hidden,bg=brightred
set-option -g status-right '%a %b %d %I:%M %p'
set-option -g window-status-current-style fg=brightred

# Claude Code window marker — set by ~/.claude/hooks/tmux-state via the
# hooks in ~/.claude/settings.json. Edit that script to tweak the marker
# strings.
set-option -g window-status-format '#I:#W#{?@claude_marker,#{@claude_marker},#{?window_flags,#{window_flags}, }}'
set-option -g window-status-current-format '#I:#W#{?@claude_marker,#{@claude_marker},#{?window_flags,#{window_flags}, }}'
